model:
  hidden_dims: [64, 32]
  dropout: [0.3, 0.2]

training:
  learning_rate: 1.0e-3
  batch_size: 32
  epochs: 100
  weight_decay: 1.0e-4
  early_stopping_patience: 10
  scheduler_patience: 5

search_space:
  learning_rate: [1.0e-4, 5.0e-4, 1.0e-3, 5.0e-3]
  batch_size: [16, 32, 64]
  hidden_dims:
    - [32, 16]
    - [64, 32]
    - [128, 64]
    - [128, 64, 32]
  dropout:
    - [0.2, 0.1]
    - [0.3, 0.2]
    - [0.4, 0.3]
    - [0.4, 0.3, 0.2]
  epochs: [50, 100, 150]
