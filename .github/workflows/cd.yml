name: CD

on:
  release:
    types: [prereleased]

env:
  PYTHON_VERSION: "3.12"
  IMAGE: mmacanmunhoz/churn-api

concurrency:
  group: cd-${{ github.event.release.tag_name }}
  cancel-in-progress: false

jobs:
  # ── 1. Gate ─────────────────────────────────────────────────────────────
  test:
    name: Lint & Testes
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}

      - uses: astral-sh/setup-uv@v5
        with:
          version: "latest"
          enable-cache: true

      - run: uv python install ${{ env.PYTHON_VERSION }}
      - run: uv sync --group dev

      - name: Lint (ruff)
        run: uv run ruff check src/ tests/ --output-format=github

      - name: Testes unitários
        run: uv run pytest tests/unit/ -v -k "not TestTrainingScript"

  # ── 2. Treinar RC ────────────────────────────────────────────────────────
  train-rc:
    name: Treinar RC
    needs: test
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}

      - uses: astral-sh/setup-uv@v5
        with:
          version: "latest"
          enable-cache: true

      - run: uv python install ${{ env.PYTHON_VERSION }}
      - run: uv sync --group dev

      - name: Treinar e registrar RC
        env:
          PYTHONPATH: .
          MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
          MLFLOW_EXPERIMENT_NAME: churn-mlp
          MLFLOW_RUN_NAME: ${{ github.event.release.tag_name }}
        run: uv run python src/models/train.py --run-name "$MLFLOW_RUN_NAME"

      - name: Resumo de métricas
        run: |
          echo "## Métricas do RC" >> $GITHUB_STEP_SUMMARY
          echo "| Métrica | Valor |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|-------|" >> $GITHUB_STEP_SUMMARY
          uv run python -c "
          import json
          d = json.load(open('models/test_results.json'))
          for k in ['recall','pr_auc','auc_roc','f1','precision']:
              if k in d: print(f'| {k} | {d[k]:.4f} |')
          " >> $GITHUB_STEP_SUMMARY

      - name: Upload artefatos
        uses: actions/upload-artifact@v4
        with:
          name: model-artifacts-${{ github.event.release.tag_name }}
          path: |
            models/mlp_best.pt
            models/pipeline.pkl
            models/mlp_config.json
            models/test_results.json
          retention-days: 30

  # ── 3. Testes de integração ──────────────────────────────────────────────
  integration-test:
    name: Testes de Integração
    needs: [test, train-rc]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}

      - uses: astral-sh/setup-uv@v5
        with:
          version: "latest"
          enable-cache: true

      - run: uv python install ${{ env.PYTHON_VERSION }}
      - run: uv sync --group dev

      - name: Baixar artefatos do treino
        uses: actions/download-artifact@v4
        with:
          name: model-artifacts-${{ github.event.release.tag_name }}
          path: models/

      - name: Suite completa
        run: uv run pytest tests/ -v --cov=src --cov-report=xml --cov-report=term-missing

      - name: Upload cobertura
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ github.event.release.tag_name }}
          path: coverage.xml
          retention-days: 14

  # ── 4. Build RC + Smoke ──────────────────────────────────────────────────
  build-rc:
    name: Build & Smoke RC
    needs: [test, train-rc, integration-test]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Baixar artefatos do treino
        uses: actions/download-artifact@v4
        with:
          name: model-artifacts-${{ github.event.release.tag_name }}
          path: models/

      - name: Verificar artefatos presentes
        run: ls -lh models/mlp_best.pt models/pipeline.pkl models/mlp_config.json

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Configurar Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build e push RC
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE }}:${{ github.event.release.tag_name }}

      - name: Smoke test no RC
        run: |
          docker run -d --name smoke-api -p 8080:8080 ${{ env.IMAGE }}:${{ github.event.release.tag_name }}

          for i in $(seq 1 12); do
            curl -sf http://localhost:8080/health > /dev/null 2>&1 && break
            [ $i -eq 12 ] && { echo "ERRO: timeout"; docker logs smoke-api; exit 1; }
            sleep 5
          done

          curl -sf http://localhost:8080/health | python -c "
          import sys, json; d = json.load(sys.stdin)
          assert d['status'] == 'ok', f'status inesperado: {d}'
          print('GET /health ✅', d['status'])
          "

          curl -sf -X POST http://localhost:8080/api/v1/predict \
            -H "Content-Type: application/json" \
            -d '{"gender":"Male","SeniorCitizen":0,"Partner":"Yes","Dependents":"No","tenure":12,"PhoneService":"Yes","MultipleLines":"No phone service","InternetService":"Fiber optic","OnlineSecurity":"No","OnlineBackup":"No","DeviceProtection":"No","TechSupport":"No","StreamingTV":"No","StreamingMovies":"No","Contract":"Month-to-month","PaperlessBilling":"Yes","PaymentMethod":"Electronic check","MonthlyCharges":70.35,"TotalCharges":844.20}' \
            | python -c "
          import sys, json; d = json.load(sys.stdin)
          assert 0 <= d['churn_probability'] <= 1
          print('POST /api/v1/predict ✅ churn_probability =', d['churn_probability'])
          "

          docker stop smoke-api

      - name: Atualizar release com métricas e instruções
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          METRICS_TABLE=""
          if [ -f models/test_results.json ]; then
            METRICS_TABLE=$(python -c "
          import json
          d = json.load(open('models/test_results.json'))
          for k in ['recall', 'pr_auc', 'auc_roc', 'f1', 'precision']:
              if k in d:
                  print(f'| {k} | {d[k]:.4f} |')
          ")
          fi

          gh release edit "${{ github.event.release.tag_name }}" \
            --notes "## Release Candidate \`${{ github.event.release.tag_name }}\`

          > Smoke test passou ✅. Para deployar em produção, promova este pre-release para release.

          ### Como promover
          Clique em **Edit** → desmarque **Set as a pre-release** → **Update release**.
          Isso dispara o deploy automático em produção.

          ### Imagem Docker
          \`\`\`
          docker pull ${{ env.IMAGE }}:${{ github.event.release.tag_name }}
          \`\`\`

          ### Métricas do modelo
          | Métrica | Valor |
          |---------|-------|
          ${METRICS_TABLE}

          ### Commit
          \`${{ github.sha }}\`"

          echo "## RC Validado ✅" >> $GITHUB_STEP_SUMMARY
          echo "Tag: \`${{ github.event.release.tag_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "Promova em: https://github.com/${{ github.repository }}/releases/tag/${{ github.event.release.tag_name }}" >> $GITHUB_STEP_SUMMARY
