name: Deploy to Production

on:
  release:
    types: [released]

env:
  IMAGE: mmacanmunhoz/churn-api
  COMPOSE_DIR: /opt/mlflow-fastapi
  HEALTH_URL: https://api.pocsarcotech.com/health

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    environment: production
    env:
      EC2_HOST: ${{ secrets.EC2_HOST }}

    steps:
      - name: Extrair RC tag e imagem
        id: meta
        run: |
          RC_TAG="${{ github.event.release.tag_name }}"
          echo "rc_tag=${RC_TAG}"             >> $GITHUB_OUTPUT
          echo "deploy_image=${{ env.IMAGE }}:${RC_TAG}" >> $GITHUB_OUTPUT

      # ── 1. Promover imagem no Docker Hub ────────────────────────────────
      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Promover RC para :latest
        run: |
          docker pull ${{ steps.meta.outputs.deploy_image }}
          docker tag  ${{ steps.meta.outputs.deploy_image }} ${{ env.IMAGE }}:latest
          docker push ${{ env.IMAGE }}:latest

      # ── 2. SSH e deploy na EC2 ──────────────────────────────────────────
      - name: Configurar SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.EC2_SSH_KEY }}

      - name: Adicionar EC2 ao known_hosts
        run: |
          for i in $(seq 1 12); do
            ssh-keyscan -H -T 10 ${{ env.EC2_HOST }} >> ~/.ssh/known_hosts 2>/dev/null && break
            echo "Tentativa $i/12 — SSH ainda não disponível, aguardando 10s..."
            [ $i -eq 12 ] && { echo "ERRO: EC2 não respondeu na porta 22"; exit 1; }
            sleep 10
          done

      - name: Deploy na EC2
        id: deploy
        run: |
          DEPLOY_IMAGE="${{ steps.meta.outputs.deploy_image }}"

          ssh ubuntu@${{ env.EC2_HOST }} << EOF
          set -euo pipefail
          cd ${{ env.COMPOSE_DIR }}

          # Salva referência de rollback antes de atualizar
          CURRENT=\$(docker inspect fastapi --format='{{.Config.Image}}' 2>/dev/null || echo '')
          if [ -n "\$CURRENT" ]; then
            docker tag "\$CURRENT" ${{ env.IMAGE }}:rollback 2>/dev/null || true
            echo "Rollback salvo: \$CURRENT"
          fi

          # Pull da imagem promovida
          docker pull "${DEPLOY_IMAGE}"

          # Atualiza docker-compose.yml para usar imagem pré-construída:
          #   primeiro deploy  → substitui bloco build: por image:
          #   deploys seguintes → atualiza a linha image: existente
          sed -i 's|    build:|    image: "${DEPLOY_IMAGE}"|' docker-compose.yml
          sed -i '/      context: \./d; /      dockerfile: Dockerfile/d' docker-compose.yml
          sed -i 's|    image: "[^"]*"|    image: "${DEPLOY_IMAGE}"|' docker-compose.yml

          docker compose up -d fastapi
          echo "Container fastapi atualizado para ${DEPLOY_IMAGE}"
          EOF

      # ── 3. Health check ─────────────────────────────────────────────────
      - name: Health check (3 min timeout)
        run: |
          for i in $(seq 1 18); do
            STATUS=$(curl -sf ${{ env.HEALTH_URL }} \
              | python3 -c "import sys,json; print(json.load(sys.stdin).get('status',''))" \
              2>/dev/null || echo "")
            [ "$STATUS" = "healthy" ] && echo "Health check passou ✅" && exit 0
            echo "Tentativa $i/18 — aguardando 10s..."
            sleep 10
          done
          echo "ERRO: health check falhou após 3 minutos"
          exit 1

      # ── 4. Rollback automático se health check falhar ───────────────────
      - name: Rollback em caso de falha
        if: failure() && steps.deploy.outcome == 'success'
        run: |
          ssh ubuntu@${{ env.EC2_HOST }} << 'ENDSSH'
          set -euo pipefail
          cd /opt/mlflow-fastapi

          if docker image inspect $(docker images --filter=reference='*/churn-api:rollback' -q) > /dev/null 2>&1; then
            ROLLBACK_IMG=$(docker images --filter=reference='*/churn-api:rollback' --format '{{.Repository}}:{{.Tag}}')
            sed -i "s|    image: \"[^\"]*\"|    image: \"${ROLLBACK_IMG}\"|" docker-compose.yml
            docker compose up -d fastapi
            echo "Rollback concluído: ${ROLLBACK_IMG}"
          else
            echo "AVISO: imagem de rollback não encontrada — intervenção manual necessária"
            exit 1
          fi
          ENDSSH

      # ── 5. Pós-deploy ───────────────────────────────────────────────────
      - name: Atualizar Release com confirmação do deploy
        if: success()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          EXISTING=$(gh release view "${{ github.event.release.tag_name }}" --json body --jq '.body')
          gh release edit "${{ github.event.release.tag_name }}" \
            --notes "${EXISTING}

          ---
          ## Deploy em Produção ✅

          **Deployado em:** $(date -u '+%Y-%m-%d %H:%M UTC')
          **Imagem:** \`${{ steps.meta.outputs.deploy_image }}\`
          **Health:** ${{ env.HEALTH_URL }}"

      - name: Resumo do workflow
        if: always()
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            echo "## Deploy Concluído ✅" >> $GITHUB_STEP_SUMMARY
            echo "| Campo | Valor |" >> $GITHUB_STEP_SUMMARY
            echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
            echo "| Imagem | \`${{ steps.meta.outputs.deploy_image }}\` |" >> $GITHUB_STEP_SUMMARY
            echo "| Health | ${{ env.HEALTH_URL }} |" >> $GITHUB_STEP_SUMMARY
            echo "| Horário | $(date -u '+%Y-%m-%d %H:%M UTC') |" >> $GITHUB_STEP_SUMMARY
          else
            echo "## Deploy Falhou ❌" >> $GITHUB_STEP_SUMMARY
            echo "Rollback automático tentado. Verifique os logs." >> $GITHUB_STEP_SUMMARY
          fi
